<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>

  <h1>Weather App</h1>

  <div class="controls">
    <select id="city-select">
      <option value=""></option>
      <option value="new york">New York</option>
      <option value="los angeles">Los Angeles</option>
      <option value="chicago">Chicago</option>
      <option value="paris">Paris</option>
      <option value="tokyo">Tokyo</option>
      <option value="london">London</option>
    </select>

    <button id="get-weather-btn">Get Weather</button>
  </div>

  <div class="weather-container">
    <div class="weather-instruction">
      <h1>Please select the city from the drop-down menu, and click "Get Weather" button.</h1>
    </div>
    <div class="weather-info">
      <h2 id="location"></h2>

      <img id="weather-icon" src="" alt="weather icon" />

      <p>Temperature: <span id="main-temperature"></span></p>
      <p>Feels like: <span id="feels-like"></span></p>
      <p>Humidity: <span id="humidity"></span></p>
      <p>Wind: <span id="wind"></span></p>
      <p>Wind Gust: <span id="wind-gust"></span></p>
      <p>Condition: <span id="weather-main"></span></p>
    </div>
  </div>

  <script src="./assets/js/script.js"></script>
</body>
</html>
